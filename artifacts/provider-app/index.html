<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#2563eb" />
    <!-- iOS PWA: keeps the app full-screen when launched from home
         screen + uses a translucent status bar so safe-area insets
         compose with our top bar. The user MUST add to home screen
         (Share -> Add to Home Screen) for these to take effect — iOS
         doesn't expose a beforeinstallprompt event. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="HaloNote" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/halonote-icon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <title>HaloNote</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register the shell-only service worker.
      // We skip on localhost so Vite HMR isn't intercepted by the SW —
      // the dev server doesn't ship content-hashed /assets/ filenames
      // anyway, so the cache-first branch never fires productively in
      // dev.
      if (
        "serviceWorker" in navigator &&
        location.hostname !== "localhost" &&
        location.hostname !== "127.0.0.1"
      ) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("/sw.js", { scope: "/" })
            .catch((err) => console.warn("SW register failed", err));
        });
      }
    </script>
  </body>
</html>
