name: typecheck

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      # TODO: switch back to --frozen-lockfile once pnpm-lock.yaml has been
      # regenerated on Linux (after the lib/integrations/ehr package was added
      # the lockfile drifted; this machine can't run pnpm to refresh it).
      - run: pnpm install --no-frozen-lockfile

      - run: pnpm run typecheck
