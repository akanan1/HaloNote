# Postgres for integration tests. Run with:
#   docker compose -f docker-compose.test.yml up -d
# Then set TEST_DATABASE_URL in .env:
#   TEST_DATABASE_URL=postgres://halonote:halonote_test@localhost:5433/halonote_test
#
# Port 5433 (not 5432) so it doesn't collide with any dev Postgres
# instance already running. Data is ephemeral — `down -v` wipes it.
# This setup is for the test harness only; never point production at it.

services:
  postgres-test:
    image: postgres:16-alpine
    container_name: halonote-postgres-test
    restart: unless-stopped
    environment:
      POSTGRES_USER: halonote
      POSTGRES_PASSWORD: halonote_test
      POSTGRES_DB: halonote_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U halonote -d halonote_test"]
      interval: 5s
      timeout: 5s
      retries: 5
    # No volume mount — tests TRUNCATE between files anyway, and a fresh
    # `down -v && up -d` gives us a guaranteed-clean slate.
