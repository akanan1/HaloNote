openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: patients
    description: Patient data
  - name: notes
    description: Clinical notes
  - name: audit
    description: Compliance + access logs
  - name: admin
    description: Administrative operations (role-gated)
  - name: recordings
    description: Ambient-scribe audio capture + AI structuring pipeline
  - name: encounters
    description: Visit envelope for note + billing + orders + tasks
  - name: smart-phrases
    description: Per-provider dot-phrase expansions used by the note editor
  - name: verbal-cues
    description: Per-provider phrases that auto-stop the streaming recorder
  - name: billing
    description: AI billing-code suggestions + provider/biller approval flow
  - name: orders
    description: AI order suggestions + clinician approval, lifecycle, cancellation
  - name: tasks
    description: Clinical task generation + assignment workflow
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /auth/signup:
    post:
      operationId: signup
      tags: [auth]
      summary: Create a new provider account and sign in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
      responses:
        "201":
          description: Account created and session started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "400":
          description: Validation failed
        "409":
          description: An account with this email already exists
  /auth/password-reset/request:
    post:
      operationId: requestPasswordReset
      tags: [auth]
      summary: Send a password-reset link to an email
      description: >-
        Always returns 204 — we don't reveal whether the email belongs to
        a real account (user-enumeration defense).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordResetRequest"
      responses:
        "204":
          description: Request accepted
  /auth/password-reset/confirm:
    post:
      operationId: confirmPasswordReset
      tags: [auth]
      summary: Set a new password using a reset token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordResetConfirm"
      responses:
        "200":
          description: Password updated and session started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "400":
          description: Invalid, expired, or already-used token
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Sign in with email + password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Signed in; sets the session cookie
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Invalid credentials
  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Sign out the current session
      responses:
        "204":
          description: Signed out
  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get the signed-in user
      responses:
        "200":
          description: The signed-in user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not signed in
    patch:
      operationId: updateMe
      tags: [auth]
      summary: Partial self-update of the signed-in user's preferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMeRequest"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not signed in
  /founder/legal-versions:
    post:
      operationId: uploadLegalVersion
      tags: [founder]
      summary: Publish a new version of a legal document
      description: >-
        Append-only. Stores the supplied markdown as a new row in
        `legal_document_overrides` and makes it the current version
        for that document type. Previous versions stay in the table
        and are still referenced by historical acceptance rows. All
        users with stale acceptances are notified by email.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadLegalVersionRequest"
      responses:
        "201":
          description: New version published
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadLegalVersionResult"
        "409":
          description: Version conflict — that (type, version) already exists.
  /founder/users/{id}/require-reaccept:
    post:
      operationId: requireUserReaccept
      tags: [founder]
      summary: Force the user to re-accept the legal agreements
      description: >-
        Sets `legalReacceptRequiredAt = now()` on the target user.
        Their existing acceptance rows stay on the audit trail; they
        just no longer count as current until the user clicks
        through onboarding again.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Re-acceptance required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FounderUserDetail"
        "404":
          description: User not found
  /founder/users/{id}:
    get:
      operationId: getFounderUserDetail
      tags: [founder]
      summary: Detail view for a single user — full legal acceptance history
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FounderUserDetail"
        "404":
          description: Not a founder, or user not found
  /founder/analytics:
    get:
      operationId: getFounderAnalytics
      tags: [founder]
      summary: Cross-tenant analytics + per-user legal acceptance status
      description: >-
        Founder-only. Returns aggregate platform stats (user/patient/note/
        recording counts), recent signups, and a per-user row with
        activity counts and the acceptance status for each required
        legal document. Returns 404 to non-founders so the endpoint
        doesn't advertise its existence.
      responses:
        "200":
          description: Analytics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FounderAnalytics"
        "404":
          description: Not a founder
  /legal/agreements:
    get:
      operationId: getLegalAgreements
      tags: [legal]
      summary: Get current legal agreements and acceptance status
      description: >-
        Returns each currently-required document (BAA, ToS, Privacy)
        with its full body text, the current version, and whether the
        signed-in user has accepted that version. The frontend uses
        this to render the agreement-acceptance step of onboarding and
        to surface acceptance history in Settings.
      responses:
        "200":
          description: Agreements with per-user acceptance status
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/LegalAgreementStatus"
  /legal/accept:
    post:
      operationId: acceptLegalAgreements
      tags: [legal]
      summary: Record acceptance of one or more legal agreements
      description: >-
        Idempotent per (user, documentType, version). The server
        computes the content hash from the in-repo text and stores it
        with IP + user agent. Returns the refreshed acceptance status
        so the client can advance.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcceptLegalAgreementsRequest"
      responses:
        "200":
          description: Acceptances recorded
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/LegalAgreementStatus"
        "400":
          description: Request references an unknown document type or version
  /onboarding/complete:
    post:
      operationId: completeOnboarding
      tags: [onboarding]
      summary: Mark the first-run onboarding flow as completed
      description: >-
        Idempotent. Sets `users.onboardingCompletedAt` to `now()` if it's
        currently null. Returns the refreshed AuthUser so the client can
        update its cached state in one round trip.
      responses:
        "200":
          description: Onboarding marked complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
  /users:
    get:
      operationId: listUsers
      tags: [admin]
      summary: List all users (admin only)
      responses:
        "200":
          description: A list of users
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AdminUser"
        "403":
          description: Caller is not an admin
  /users/{id}:
    patch:
      operationId: updateUser
      tags: [admin]
      summary: Update a user's role (admin only)
      description: >-
        Currently only the `role` field is mutable. Self-demotion (an
        admin downgrading their own account) is refused so the system
        can't be left without any admin.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "400":
          description: Validation failed
        "403":
          description: Caller is not an admin, or attempting to demote self
        "404":
          description: User not found
  /audit-log:
    get:
      operationId: listAuditLog
      tags: [audit]
      summary: List audit log entries
      description: >-
        Returns audit log entries, newest first. Cursor-pagination via
        `before` + `limit`. Optional filters on userId, resourceType,
        and action.
      parameters:
        - name: before
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
        - name: userId
          in: query
          required: false
          schema:
            type: string
        - name: resourceType
          in: query
          required: false
          schema:
            type: string
        - name: action
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: A page of audit entries
          content:
            application/json:
              schema:
                type: object
                required: [data, nextCursor]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AuditLogEntry"
                  nextCursor:
                    type: ["string", "null"]
                    format: date-time
  /patients:
    get:
      operationId: listPatients
      tags: [patients]
      summary: List patients
      description: Returns the patients accessible to the signed-in provider.
      responses:
        "200":
          description: A list of patients
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Patient"
    post:
      operationId: createPatient
      tags: [patients]
      summary: Onboard a new patient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePatientRequest"
      responses:
        "201":
          description: Patient created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"
        "409":
          description: A patient with this MRN already exists
  /patients/sync:
    post:
      operationId: syncPatientFromEhr
      tags: [patients]
      summary: Pull a patient from the configured EHR
      description: >-
        Reads `Patient/{externalId}` from the EHR named by `EHR_MODE`
        and upserts the local row keyed on MRN. Returns 201 when a new
        row was inserted and 200 when an existing row was refreshed.
        Mock mode (EHR_MODE unset) synthesizes demographics from the id
        for local development.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncPatientRequest"
      responses:
        "200":
          description: Existing patient refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncedPatient"
        "201":
          description: New patient inserted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncedPatient"
        "400":
          description: External id missing or empty
        "404":
          description: The EHR returned no patient for this external id
        "422":
          description: The EHR record was missing fields HaloNote requires
        "502":
          description: The EHR returned an error
  /notes:
    get:
      operationId: listNotes
      tags: [notes]
      summary: List clinical notes
      description: >-
        Returns notes the signed-in provider can see, newest first. When
        `patientId` is supplied, only notes for that patient are returned.
        Cursor-based pagination via `before` + `limit` — pass the previous
        response's `nextCursor` to fetch the next page.
      parameters:
        - name: patientId
          in: query
          required: false
          schema:
            type: string
        - name: before
          in: query
          required: false
          description: ISO 8601 timestamp; returns notes created strictly before this.
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          required: false
          description: Page size. Defaults to 50, max 200.
          schema:
            type: integer
            minimum: 1
            maximum: 200
      responses:
        "200":
          description: A list of notes
          content:
            application/json:
              schema:
                type: object
                required: [data, nextCursor]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Note"
                  nextCursor:
                    type: ["string", "null"]
                    format: date-time
                    description: Pass back as `before` to load the next page. Null when no more rows.
    post:
      operationId: createNote
      tags: [notes]
      summary: Create a clinical note
      description: Persist a free-text clinical note attached to a patient.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNoteRequest"
      responses:
        "201":
          description: Note created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"
  /notes/{id}:
    get:
      operationId: getNote
      tags: [notes]
      summary: Read a single note
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"
        "404":
          description: Note not found
    delete:
      operationId: deleteNote
      tags: [notes]
      summary: Soft-delete a note
      description: >-
        Marks the note status as entered-in-error. The row stays in the
        database for audit and amendment-chain integrity; the UI treats
        it as withdrawn. Clinical data is never hard-deleted.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Note marked entered-in-error
        "404":
          description: Note not found
    patch:
      operationId: updateNote
      tags: [notes]
      summary: Edit a note's body
      description: >-
        Update the free-text body of an existing note. The patient,
        author, and EHR status are immutable through this endpoint —
        re-send to the EHR via POST /notes/{id}/send-to-ehr if you want
        downstream to reflect the edit.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNoteRequest"
      responses:
        "200":
          description: The updated note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"
        "404":
          description: Note not found
  /notes/{id}/send-to-ehr:
    post:
      operationId: sendNoteToEhr
      tags: [notes]
      summary: Send a note to the configured EHR
      description: >-
        Build a FHIR DocumentReference from the stored note and push it to
        the configured EHR provider. When no provider is configured, runs in
        mock mode and returns a synthetic document reference.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Pushed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EhrPushResult"
        "404":
          description: Note or patient not found
        "502":
          description: EHR rejected the document
  /schedule/today:
    get:
      operationId: getTodaySchedule
      tags: [schedule]
      summary: Appointments for the signed-in provider on a given day
      description: >-
        Returns appointments from the configured EHR for the requested
        local-date (defaults to today), scoped to the calling user's
        `ehrPractitionerId`. Returns 409 if the user is not linked to
        an EHR practitioner yet. Mock mode returns a synthetic roster
        when EHR_MODE is unset.
      parameters:
        - in: query
          name: date
          required: false
          schema:
            type: string
            pattern: "^\\d{4}-\\d{2}-\\d{2}$"
          description: >-
            Local-date in YYYY-MM-DD. If omitted, today's date is used.
      responses:
        "200":
          description: Schedule
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ScheduledAppointment"
        "400":
          description: date query param is not in YYYY-MM-DD format
        "409":
          description: Caller has no ehrPractitionerId set
        "502":
          description: EHR returned an error
  /encounters:
    get:
      operationId: listEncounters
      tags: [encounters]
      summary: List encounters in the active organization
      description: |
        Returns encounters scoped to the caller's active organization,
        ordered by createdAt desc. Optional patientId narrows to a
        single chart. Cap at 200 rows; revisit with cursor pagination if
        a busy clinic exceeds it.
      parameters:
        - name: patientId
          in: query
          required: false
          schema: { type: string }
      responses:
        "200":
          description: List of encounters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListEncounters200"
        "401":
          description: Unauthenticated
        "409":
          description: Session has no active organization
    post:
      operationId: createEncounter
      tags: [encounters]
      summary: Start a new encounter
      description: |
        Patient must belong to the active organization. visitType='custom'
        requires customLabel; any other visitType forbids it. Defaults
        providerId to the current user when not supplied.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEncounterRequest"
      responses:
        "201":
          description: Created encounter
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Encounter" }
        "400":
          description: Invalid request or custom_label mismatch
        "404":
          description: Patient not found in the active organization
  /encounters/{id}:
    get:
      operationId: getEncounter
      tags: [encounters]
      summary: Read a single encounter
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Encounter
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Encounter" }
        "404":
          description: Encounter not found in the active organization
    patch:
      operationId: updateEncounter
      tags: [encounters]
      summary: Update encounter fields and/or transition status
      description: |
        Status transitions are enforced server-side: scheduled →
        in_progress → completed are the legal forward steps; cancellation
        is allowed from any non-terminal state. Completed and cancelled
        are terminal. Auto-stamps startedAt / completedAt timestamps on
        the matching transition.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEncounterRequest"
      responses:
        "200":
          description: Updated encounter
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Encounter" }
        "400":
          description: Invalid request
        "404":
          description: Encounter not found in the active organization
        "409":
          description: Illegal status transition
  /patients/{id}/history:
    get:
      operationId: getPatientHistory
      tags: [patients]
      summary: Active problems, medications, and allergies for a patient
      description: >-
        Pulls Condition (active), MedicationRequest (active), and
        AllergyIntolerance resources from the configured EHR in parallel
        and shapes them for a note-prep panel. The patient id parameter
        is the EHR Patient.id (same value used for /patients/sync).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Patient history snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientHistory"
        "502":
          description: EHR returned an error
  /templates:
    get:
      operationId: listTemplates
      tags: [templates]
      summary: List the signed-in provider's note templates
      description: >-
        Returns the calling user's dictation templates, sorted by
        their manual ordering. On the user's first call, the server
        seeds the account with a default template set (SOAP, H&P,
        Progress, Consult, Discharge) so no provider sees an empty
        list.
      responses:
        "200":
          description: Templates
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/NoteTemplate"
    post:
      operationId: createTemplate
      tags: [templates]
      summary: Create a new template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTemplateRequest"
      responses:
        "201":
          description: Template created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NoteTemplate"
        "409":
          description: voiceCue already used by another of the caller's templates
    put:
      operationId: reorderTemplates
      tags: [templates]
      summary: Replace the manual sort order for the caller's templates
      description: >-
        Accepts the full list of template ids in the new desired order.
        Any ids the caller doesn't own are rejected. Returns the
        updated list in its new order.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReorderTemplatesRequest"
      responses:
        "200":
          description: Templates re-ordered
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/NoteTemplate"
        "400":
          description: ids list missing a template the caller owns, or includes one they don't
  /templates/{id}:
    patch:
      operationId: updateTemplate
      tags: [templates]
      summary: Edit a template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTemplateRequest"
      responses:
        "200":
          description: Template updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NoteTemplate"
        "404":
          description: Template not found (or not owned by caller)
        "409":
          description: voiceCue collides with another of the caller's templates
    delete:
      operationId: deleteTemplate
      tags: [templates]
      summary: Delete a template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Template deleted
        "404":
          description: Template not found (or not owned by caller)
  /templates/reset:
    post:
      operationId: resetTemplates
      tags: [templates]
      summary: Replace the caller's templates with the default set
      description: >-
        Deletes all of the caller's existing templates and re-seeds the
        defaults. Useful when a provider wants a clean slate after
        experimenting.
      responses:
        "200":
          description: Templates reset to defaults
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
