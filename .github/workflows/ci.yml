name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# A new push to a PR cancels the in-flight run for that PR (but keeps
# the main-branch runs untouched).
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NODE_VERSION: "24"
  # CI=true bypasses pnpm's TTY prompt when its modules dir is dirty.
  # GitHub Actions sets CI=true already, this is belt + braces.
  CI: "true"

jobs:
  # ---------------------------------------------------------------------------
  # typecheck — strict TS across every workspace package. Reuses the
  # pnpm cache from the install step.
  # ---------------------------------------------------------------------------
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck

  # ---------------------------------------------------------------------------
  # unit — fast, in-process tests. No DB.
  # ---------------------------------------------------------------------------
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test

  # ---------------------------------------------------------------------------
  # integration — api-server tests against a real Postgres service
  # container. Same path as production: migrate, then run.
  # ---------------------------------------------------------------------------
  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: halonote_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/halonote_test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # The integration test harness's globalSetup runs `drizzle-kit
      # migrate` against TEST_DATABASE_URL, so we don't need a separate
      # migrate step here.
      - run: pnpm run test:integration

  # ---------------------------------------------------------------------------
  # e2e — Playwright drives a real browser against api-server + Vite
  # dev server, both spawned by playwright's webServer config.
  # ---------------------------------------------------------------------------
  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: halonote_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/halonote_test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Apply migrations to the test DB
        # webServer-launched api-servers race with the playwright test
        # phase; running migrate explicitly first means the schema is
        # already in place when the api-server boots.
        run: DATABASE_URL=$TEST_DATABASE_URL pnpm --filter @workspace/db run migrate
      - name: Install Chromium for Playwright
        run: pnpm --filter @workspace/provider-app exec playwright install chromium --with-deps
      - run: pnpm --filter @workspace/provider-app run test:e2e
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: artifacts/provider-app/playwright-report
          retention-days: 7

  # ---------------------------------------------------------------------------
  # docker — confirms the production image actually builds. Doesn't
  # push anywhere — point this at a real registry once you pick one.
  # ---------------------------------------------------------------------------
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [typecheck, unit]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: halonote:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke-check the runtime
        # Confirm the entrypoint starts (it'll fail fast without
        # DATABASE_URL — we want it to fail with the documented error
        # message, not crash before logging).
        run: |
          set +e
          OUTPUT=$(docker run --rm halonote:ci 2>&1)
          STATUS=$?
          echo "$OUTPUT"
          # Either it exits because DATABASE_URL is missing (expected),
          # or it logs a startup-failed message. Both prove the image
          # boots; an exit code of 0 with no output would mean Node
          # crashed silently somewhere upstream.
          if [ "$STATUS" -eq 0 ]; then
            echo "Container exited 0 without DATABASE_URL — unexpected." >&2
            exit 1
          fi
          echo "$OUTPUT" | grep -qE "DATABASE_URL|migrations|Startup failed" \
            || { echo "Expected a DATABASE_URL / migration error message." >&2; exit 1; }
