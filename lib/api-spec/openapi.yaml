      tags: [ehr-auth]
      summary: Current EHR connection status for the signed-in provider
      description: >-
        Returns whether the caller has an active SMART OAuth connection
        to each supported provider, plus the practitioner id we resolved
        from the OAuth context and when the access token expires.
      responses:
        "200":
          description: Status snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EhrConnectionStatus"
  /auth/ehr/{provider}/start:
    post:
      operationId: startEhrOauth
      tags: [ehr-auth]
      summary: Begin a SMART OAuth handshake with the configured EHR
      description: >-
        Generates a PKCE-protected authorize URL the browser should
        navigate to. The browser is expected to follow the URL — Athena
        will redirect back to /api/auth/ehr/callback with a code, which
        the server exchanges for tokens.
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [athenahealth, epic]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartEhrOauthRequest"
      responses:
        "200":
          description: Authorize URL to redirect the browser to
          content:
            application/json:
              schema:
                type: object
                required: [authorizeUrl]
                properties:
                  authorizeUrl:
                    type: string
        "400":
          description: Unknown provider
  /auth/ehr/{provider}:
    delete:
      operationId: disconnectEhr
      tags: [ehr-auth]
      summary: Drop the caller's SMART OAuth tokens for a provider
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [athenahealth, epic]
      responses:
        "204":
          description: Connection deleted
        "404":
          description: No active connection for this provider
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Patient:
      type: object
      required: [id, firstName, lastName, dateOfBirth, mrn]
      properties:
        id:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        # ISO 8601 date, e.g. "1985-04-12"
        dateOfBirth:
          type: string
        mrn:
          type: string
          description: Medical record number
    Note:
      type: object
      required:
        - id
        - patientId
        - body
        - createdAt
        - updatedAt
        - author
        - status
        - replacesNoteId
        - ehrProvider
        - ehrDocumentRef
        - ehrPushedAt
        - ehrError
      properties:
        id:
          type: string
        patientId:
          type: string
        body:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
          description: Most recent edit; equal to createdAt when the note has not been edited.
        author:
          oneOf:
            - $ref: "#/components/schemas/NoteAuthor"
            - type: "null"
        status:
          type: string
          enum: [active, entered-in-error]
          description: "active = current. entered-in-error = soft-deleted; the row stays for audit traceability but the UI treats it as withdrawn."
        replacesNoteId:
          type: ["string", "null"]
          description: When set, this note supersedes the referenced one (FHIR DocumentReference relatesTo replaces).
        ehrProvider:
          type: ["string", "null"]
          description: "Provider that received this note, e.g. \"athenahealth\", \"epic\", \"mock\". Null until pushed."
        ehrDocumentRef:
          type: ["string", "null"]
          description: FHIR DocumentReference returned by the EHR. Null until pushed.
        ehrPushedAt:
          type: ["string", "null"]
          format: date-time
        ehrError:
          type: ["string", "null"]
          description: Last EHR push error message, if any.
        autoPushedWithoutReview:
          type: boolean
          description: >-
            True when the recording pipeline auto-approved + auto-pushed
            this note without the provider reviewing it (the author had
            autoPushMode=after_transcription at the time). Drives the
            "unreviewed AI version in the chart" banner on the note
            page.
    CreateNoteRequest:
      type: object
      required: [patientId, body]
      properties:
        patientId:
          type: string
        body:
          type: string
          minLength: 1
        replacesNoteId:
          type: string
          description: When set, the new note supersedes this one. The original is preserved with status active; downstream EHR pushes carry relatesTo replaces.
        encounterId:
          type: string
          description: |
            Optional encounter the note documents. Must belong to the same
            patient and the active organization, or the server returns 404.
            When set, the note appears on that encounter's review surface and
            its lifecycle (draft → approved → exported) drives the encounter
            review workflow.
    UpdateNoteRequest:
      type: object
      required: [body]
      properties:
        body:
          type: string
          minLength: 1
    VisitType:
      type: string
      enum:
        - new_patient
        - established_patient
        - follow_up
        - annual_physical
        - hospital_follow_up
        - procedure
        - telehealth
        - nursing_facility
        - custom
    EncounterStatus:
      type: string
      enum:
        - scheduled
        - in_progress
        - completed
        - cancelled
    EncounterPriority:
      type: string
      enum: [routine, urgent, stat]
    Encounter:
      type: object
      required:
        - id
        - organizationId
        - patientId
        - visitType
        - status
        - isTelehealth
        - createdAt
        - updatedAt
      properties:
        id: { type: string }
        organizationId: { type: string }
        patientId: { type: string }
        providerId: { type: string, nullable: true }
        visitType: { $ref: "#/components/schemas/VisitType" }
        customLabel: { type: string, nullable: true }
        status: { $ref: "#/components/schemas/EncounterStatus" }
        isTelehealth: { type: boolean }
        location: { type: string, nullable: true }
        scheduledAt: { type: string, format: date-time, nullable: true }
        startedAt: { type: string, format: date-time, nullable: true }
        completedAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    ListEncounters200:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/Encounter" }
    CreateEncounterRequest:
      type: object
      required: [patientId, visitType]
      properties:
        patientId: { type: string, minLength: 1 }
        visitType: { $ref: "#/components/schemas/VisitType" }
        customLabel: { type: string, minLength: 1, maxLength: 120 }
        isTelehealth: { type: boolean }
        location: { type: string, maxLength: 120 }
        scheduledAt: { type: string, format: date-time }
        providerId: { type: string, minLength: 1 }
    UpdateEncounterRequest:
      type: object
      description: |
        All fields optional. Set a field to null to clear it where the
        column allows null (location, customLabel, scheduledAt,
        providerId). visitType / status / isTelehealth are non-nullable
        so null isn't accepted there.
      properties:
        visitType: { $ref: "#/components/schemas/VisitType" }
        customLabel: { type: string, minLength: 1, maxLength: 120, nullable: true }
        isTelehealth: { type: boolean }
        location: { type: string, maxLength: 120, nullable: true }
        status: { $ref: "#/components/schemas/EncounterStatus" }
        scheduledAt: { type: string, format: date-time, nullable: true }
        providerId: { type: string, minLength: 1, nullable: true }
    CreatePatientRequest:
      type: object
      required: [firstName, lastName, dateOfBirth, mrn]
      properties:
        firstName:
          type: string
          minLength: 1
        lastName:
          type: string
          minLength: 1
        dateOfBirth:
          type: string
          description: ISO 8601 date, e.g. "1985-04-12"
          pattern: "^\\d{4}-\\d{2}-\\d{2}$"
        mrn:
          type: string
          minLength: 1
          description: Medical record number. Must be unique.
    SyncPatientRequest:
      type: object
      required: [externalId]
      properties:
        externalId:
          type: string
          minLength: 1
          description: The EHR-side patient id to read (e.g. FHIR Patient.id).
    SyncedPatient:
      type: object
      required: [id, firstName, lastName, dateOfBirth, mrn, synced]
      properties:
        id:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        dateOfBirth:
          type: string
        mrn:
          type: string
        synced:
          type: object
          required: [provider, created]
          properties:
            provider:
              type: string
              enum: [athenahealth, epic, mock]
            created:
              type: boolean
              description: True when this call inserted a new row; false when it refreshed.
    AuthUser:
      type: object
      required: [id, email, displayName, role]
      properties:
        id:
          type: string
        email:
          type: string
        displayName:
          type: string
        role:
          type: string
          enum: [admin, member]
        twoFactorEnabled:
          type: boolean
          description: True when the user has TOTP 2FA enrolled.
        onboardingCompleted:
          type: boolean
          description: >-
            False when the user hasn't finished (or skipped) the first-run
            onboarding flow. The frontend uses this to route new users
            to /onboarding on sign-in.
        isFounder:
          type: boolean
          description: >-
            Founder-tier access. Stricter than admin — gates the
            cross-tenant Founder dashboard (analytics + per-user legal
            acceptance tracking). Granted manually for the HaloNote
            team only.
        autoPushMode:
          type: string
          enum: [off, after_approve, after_transcription]
          description: >-
            Controls when a completed note ships to the EHR.
            `off` — manual Send to EHR (default).
            `after_approve` — /notes/:id/approve pushes inline.
            `after_transcription` — the recording pipeline approves
            and pushes the AI-structured note immediately, skipping
            the provider review step. Amendments still flow through
            the existing replaces chain.
        silenceAutoStopSec:
          type: integer
          minimum: 0
          maximum: 600
          description: >-
            Seconds of continuous silence before the recorder
            auto-stops. 0 disables. Typical opt-in value is 45.
    UpdateMeRequest:
      type: object
      description: >-
        Partial self-update of the signed-in user's preferences. Only
        fields present in the body are touched.
      properties:
        autoPushMode:
          type: string
          enum: [off, after_approve, after_transcription]
        silenceAutoStopSec:
          type: integer
          minimum: 0
          maximum: 600
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string
          minLength: 1
    SignupRequest:
      type: object
      required: [email, password, displayName]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          maxLength: 200
        displayName:
          type: string
          minLength: 1
          maxLength: 200
    PasswordResetRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
    PasswordResetConfirm:
      type: object
      required: [token, password]
      properties:
        token:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 8
          maxLength: 200
    AdminUser:
      type: object
      required: [id, email, displayName, role, createdAt]
      properties:
        id:
          type: string
        email:
          type: string
        displayName:
          type: string
        role:
          type: string
          enum: [admin, member]
        ehrPractitionerId:
          type: ["string", "null"]
          description: Provider's Practitioner.id in the connected EHR; used to scope schedule queries.
        createdAt:
          type: string
          format: date-time
    UpdateUserRequest:
      type: object
      properties:
        role:
          type: string
          enum: [admin, member]
        ehrPractitionerId:
          type: ["string", "null"]
          description: Set or clear the user's EHR Practitioner.id. Pass null to unlink.
    AuditLogEntry:
      type: object
      required:
        - id
        - userId
        - userDisplayName
        - action
        - resourceType
        - resourceId
        - metadata
        - at
      properties:
        id:
          type: string
        userId:
          type: ["string", "null"]
        userDisplayName:
          type: ["string", "null"]
          description: >-
            Joined from the users table at read time; null for entries
            whose user has since been deleted, or system-originated events.
        action:
          type: string
        resourceType:
          type: string
        resourceId:
          type: ["string", "null"]
        metadata:
          type: ["object", "null"]
          additionalProperties: true
        at:
          type: string
          format: date-time
    NoteAuthor:
      type: object
      required: [id, displayName]
      properties:
        id:
          type: string
        displayName:
          type: string
    EhrPushResult:
      type: object
      required: [provider, ehrDocumentRef, pushedAt, mock]
      properties:
        provider:
          type: string
          description: "EHR provider name, e.g. \"athenahealth\", \"epic\", or \"mock\"."
        ehrDocumentRef:
          type: string
          description: Fully-qualified FHIR reference returned by the EHR (e.g. "DocumentReference/abc123").
        pushedAt:
          type: string
          format: date-time
        mock:
          type: boolean
          description: True when the push was synthesized locally because no EHR is configured.
    ScheduledAppointment:
      type: object
      required: [appointmentId, start, end, status, reason, patient]
      properties:
        appointmentId:
          type: string
        start:
          type: string
          format: date-time
        end:
          type: ["string", "null"]
          format: date-time
        status:
          type: string
        reason:
          type: ["string", "null"]
        patient:
          oneOf:
            - type: "null"
            - type: object
              required: [ehrId, display]
              properties:
                ehrId:
                  type: string
                display:
                  type: string
    PatientHistory:
      type: object
      required: [problems, medications, allergies]
      properties:
        problems:
          type: array
          items:
            type: object
            required: [id, text, onsetDate]
            properties:
              id:
                type: string
              text:
                type: string
              onsetDate:
                type: ["string", "null"]
        medications:
          type: array
          items:
            type: object
            required: [id, text, dosage]
            properties:
              id:
                type: string
              text:
                type: string
              dosage:
                type: ["string", "null"]
        allergies:
          type: array
          items:
            type: object
            required: [id, text, severity, reactions]
            properties:
              id:
                type: string
              text:
                type: string
              severity:
                type: ["string", "null"]
              reactions:
                type: array
                items:
                  type: string
    NoteTemplate:
      type: object
      required:
        - id
        - name
        - voiceCue
        - body
        - sortOrder
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        name:
          type: string
          minLength: 1
          maxLength: 120
        voiceCue:
          type: ["string", "null"]
          description: >-
            Phrase that, when heard at the start of dictation, swaps to
            this template. Lowercased server-side; null disables voice
            matching for this template (selection only).
        body:
          type: string
          description: Skeleton inserted into the textarea when the template is selected. May be empty.
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CreateTemplateRequest:
      type: object
      required: [name, body]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        voiceCue:
          type: ["string", "null"]
          maxLength: 80
        body:
          type: string
    UpdateTemplateRequest:
      type: object
      description: >-
        Partial update. Any provided field replaces; omitted fields are
        untouched. Pass voiceCue=null to clear the cue.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        voiceCue:
          type: ["string", "null"]
          maxLength: 80
        body:
          type: string
    ReorderTemplatesRequest:
      type: object
      required: [ids]
      properties:
        ids:
          type: array
          minItems: 0
          items:
            type: string
          description: >-
            All of the caller's template ids in their new desired order.
    PhraseMapping:
      type: object
      required:
        - id
        - spoken
        - documented
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        spoken:
          type: string
          minLength: 1
          maxLength: 200
          description: >-
            The colloquial phrase the provider tends to say during a
            visit. Matched case-insensitively in the transcript.
        documented:
          type: string
          minLength: 1
          maxLength: 200
          description: >-
            The preferred documentation term to use in the AI-generated
            note when the spoken phrase is detected.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CreatePhraseMappingRequest:
      type: object
      required: [spoken, documented]
      properties:
        spoken:
          type: string
          minLength: 1
          maxLength: 200
        documented:
          type: string
          minLength: 1
          maxLength: 200
    UpdatePhraseMappingRequest:
      type: object
      description: >-
        Partial update. Any provided field replaces; omitted fields are
        untouched.
      properties:
        spoken:
          type: string
          minLength: 1
          maxLength: 200
        documented:
          type: string
          minLength: 1
          maxLength: 200
    SmartPhrase:
      type: object
      required:
        - id
        - shortcut
        - body
        - description
        - usageCount
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        shortcut:
          type: string
          minLength: 1
          maxLength: 40
          description: >-
            The token typed after `.` in the note editor. Stored
            lowercased; whitespace and dot characters are rejected.
        body:
          type: string
          minLength: 1
          description: >-
            Expansion text inserted into the note. May be multi-line.
        description:
          type: ["string", "null"]
          maxLength: 200
          description: >-
            Optional hint shown in the autocomplete dropdown.
        usageCount:
          type: integer
          description: >-
            Times the phrase has been expanded. Used for autocomplete
            ranking within prefix matches.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CreateSmartPhraseRequest:
      type: object
      required: [shortcut, body]
      properties:
        shortcut:
          type: string
          minLength: 1
          maxLength: 40
          description: >-
            Whitespace and `.` characters are rejected. Server
            lowercases before persisting.
        body:
          type: string
          minLength: 1
        description:
          type: ["string", "null"]
          maxLength: 200
    UpdateSmartPhraseRequest:
      type: object
      description: >-
        Partial update. Any provided field replaces; omitted fields are
        untouched. Pass description=null to clear the hint.
      properties:
        shortcut:
          type: string
          minLength: 1
          maxLength: 40
        body:
          type: string
          minLength: 1
        description:
          type: ["string", "null"]
          maxLength: 200
    VerbalCue:
      type: object
      required: [id, phrase, createdAt, updatedAt]
      properties:
        id:
          type: string
        phrase:
          type: string
          minLength: 1
          maxLength: 120
          description: >-
            End-of-visit phrase. Matched case-insensitively as a
            substring against streaming Deepgram is_final events.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CreateVerbalCueRequest:
      type: object
      required: [phrase]
      properties:
        phrase:
          type: string
          minLength: 1
          maxLength: 120
    NoteDefault:
      type: object
      required:
        - id
        - label
        - rule
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        label:
          type: string
          minLength: 1
          maxLength: 120
        rule:
          type: string
          minLength: 1
          maxLength: 1000
          description: >-
            Imperative instruction the AI applies on every encounter
            unless the transcript contradicts it.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CreateNoteDefaultRequest:
      type: object
      required: [label, rule]
      properties:
        label:
          type: string
          minLength: 1
          maxLength: 120
        rule:
          type: string
          minLength: 1
          maxLength: 1000
    UpdateNoteDefaultRequest:
      type: object
      description: >-
        Partial update. Any provided field replaces; omitted fields are
        untouched.
      properties:
        label:
          type: string
          minLength: 1
          maxLength: 120
        rule:
          type: string
          minLength: 1
          maxLength: 1000
    # ------------------------------------------------------------
    # Billing / Orders / Tasks — backfilled in Phase 28.
    # ------------------------------------------------------------
    BillingCodeSystem:
      type: string
      enum: [icd10, cpt, em, modifier]
    SuggestionConfidence:
      type: string
      enum: [low, medium, high]
    BillingSuggestionStatus:
      type: string
      enum:
        - ai_suggested
        - needs_review
        - provider_approved
        - biller_approved
        - rejected
        - exported
    BillingSupportingExcerpt:
      type: object
      required: [text]
      properties:
        text: { type: string }
        locationHint: { type: string }
    BillingDocumentationGap:
      type: object
      required: [field, message, severity]
      properties:
        field: { type: string }
        message: { type: string }
        severity:
          type: string
          enum: [info, warn, block]
    BillingSuggestion:
      type: object
      required:
        - id
        - codeSystem
        - code
        - description
        - rationale
        - supportingExcerpts
        - documentationGaps
        - confidence
        - status
        - createdByAi
      properties:
        id: { type: string }
        codeSystem: { $ref: "#/components/schemas/BillingCodeSystem" }
        code: { type: string }
        description: { type: string }
        rationale: { type: string }
        supportingExcerpts:
          type: array
          items: { $ref: "#/components/schemas/BillingSupportingExcerpt" }
        documentationGaps:
          type: array
          items: { $ref: "#/components/schemas/BillingDocumentationGap" }
        confidence: { $ref: "#/components/schemas/SuggestionConfidence" }
        status: { $ref: "#/components/schemas/BillingSuggestionStatus" }
        createdByAi: { type: boolean }
    ApprovedBillingCode:
      type: object
      required:
        - id
        - codeSystem
        - code
        - description
        - sourceSuggestionId
        - approvedAt
        - billerApprovedAt
        - exportedAt
      properties:
        id: { type: string }
        codeSystem: { $ref: "#/components/schemas/BillingCodeSystem" }
        code: { type: string }
        description: { type: string }
        sourceSuggestionId:
          type: ["string", "null"]
        approvedAt:
          type: ["string", "null"]
          format: date-time
        billerApprovedAt:
          type: ["string", "null"]
          format: date-time
        exportedAt:
          type: ["string", "null"]
          format: date-time
        ehrDocumentRef:
          type: ["string", "null"]
          description: Resource ref returned by the charge system after a successful push.
        ehrError:
          type: ["string", "null"]
          description: Last EHR push error, if any. Cleared on success.
    BillingResponse:
      type: object
      required: [suggestions, approvedCodes]
      properties:
        suggestions:
          type: array
          items: { $ref: "#/components/schemas/BillingSuggestion" }
        approvedCodes:
          type: array
          items: { $ref: "#/components/schemas/ApprovedBillingCode" }
    BillingSuggestSource:
      type: string
      enum: [ai, stub]
    EhrPushOutcome:
      type: object
      required: [provider, ehrDocumentRef, pushedAt, mock]
      properties:
        provider:
          type: string
          enum: [athenahealth, epic, mock]
        ehrDocumentRef:
          type: string
          description: >-
            FHIR-style "ResourceType/id" reference returned by the
            upstream after a successful push (or a synthetic
            "mock-<localId>" identifier in mock mode).
        pushedAt:
          type: string
          format: date-time
        mock:
          type: boolean
          description: True when the push was a no-op against the mock backend.
    BillingSuggestResponse:
      allOf:
        - $ref: "#/components/schemas/BillingResponse"
        - type: object
          required: [source]
          properties:
            source: { $ref: "#/components/schemas/BillingSuggestSource" }
    RejectBillingSuggestionRequest:
      type: object
      properties:
        reason:
          type: string
          maxLength: 500

    OrderType:
      type: string
      enum:
        - lab
        - imaging
        - referral
        - medication
        - procedure
        - followup
        - instruction
        - dme
        - therapy
        - nursing
    OrderPriority:
      type: string
      enum: [routine, urgent, stat]
    OrderSuggestionStatus:
      type: string
      enum: [ai_suggested, needs_review, approved, rejected, exported]
    ApprovedOrderStatus:
      type: string
      enum: [approved, export_ready, exported, cancelled]
    OrderSafetyWarning:
      type: object
      required: [kind, message, severity]
      properties:
        kind: { type: string }
        message: { type: string }
        severity:
          type: string
          enum: [info, warn, block]
    OrderCommon:
      type: object
      required:
        - id
        - orderType
        - name
        - indication
        - indicationDiagnosisCode
        - priority
        - instructions
        - frequency
        - duration
        - medicationName
        - medicationDose
        - medicationRoute
        - medicationFrequency
        - medicationDuration
        - medicationQuantity
        - medicationRefills
        - isComplete
        - safetyWarnings
      properties:
        id: { type: string }
        orderType: { $ref: "#/components/schemas/OrderType" }
        name: { type: string }
        indication: { type: ["string", "null"] }
        indicationDiagnosisCode: { type: ["string", "null"] }
        priority: { $ref: "#/components/schemas/OrderPriority" }
        instructions: { type: ["string", "null"] }
        frequency: { type: ["string", "null"] }
        duration: { type: ["string", "null"] }
        medicationName: { type: ["string", "null"] }
        medicationDose: { type: ["string", "null"] }
        medicationRoute: { type: ["string", "null"] }
        medicationFrequency: { type: ["string", "null"] }
        medicationDuration: { type: ["string", "null"] }
        medicationQuantity:
          type: ["integer", "null"]
        medicationRefills:
          type: ["integer", "null"]
        isComplete: { type: boolean }
        safetyWarnings:
          type: array
          items: { $ref: "#/components/schemas/OrderSafetyWarning" }
    OrderSuggestion:
      allOf:
        - $ref: "#/components/schemas/OrderCommon"
        - type: object
          required: [rationale, status, createdByAi]
          properties:
            rationale: { type: string }
            status: { $ref: "#/components/schemas/OrderSuggestionStatus" }
            createdByAi: { type: boolean }
    ApprovedOrder:
      allOf:
        - $ref: "#/components/schemas/OrderCommon"
        - type: object
          required:
            - sourceSuggestionId
            - status
            - approvedAt
            - exportReadyAt
            - exportedAt
          properties:
            sourceSuggestionId: { type: ["string", "null"] }
            status: { $ref: "#/components/schemas/ApprovedOrderStatus" }
            approvedAt:
              type: ["string", "null"]
              format: date-time
            exportReadyAt:
              type: ["string", "null"]
              format: date-time
            exportedAt:
              type: ["string", "null"]
              format: date-time
            ehrDocumentRef:
              type: ["string", "null"]
              description: Resource ref returned by the EHR after a successful push.
            ehrError:
              type: ["string", "null"]
              description: Last EHR push error, if any. Cleared on success.
    OrdersResponse:
      type: object
      required: [suggestions, approvedOrders]
      properties:
        suggestions:
          type: array
          items: { $ref: "#/components/schemas/OrderSuggestion" }
        approvedOrders:
          type: array
          items: { $ref: "#/components/schemas/ApprovedOrder" }
    OrderSuggestResponse:
      type: object
      required: [data, source]
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/OrderSuggestion" }
        source:
          type: string
          enum: [ai, stub]
    RejectOrderSuggestionRequest:
      type: object
      properties:
        reason:
          type: string
          maxLength: 500
    CreateOrderRequest:
      type: object
      required: [encounterId, orderType, name]
      properties:
        encounterId: { type: string }
        orderType: { $ref: "#/components/schemas/OrderType" }
        name:
          type: string
          minLength: 1
          maxLength: 200
        indication: { type: string, maxLength: 500 }
        indicationDiagnosisCode: { type: string, maxLength: 20 }
        priority: { $ref: "#/components/schemas/OrderPriority" }
        instructions: { type: string, maxLength: 2000 }
        frequency: { type: string, maxLength: 100 }
        duration: { type: string, maxLength: 100 }
        medicationName: { type: string, maxLength: 200 }
        medicationDose: { type: string, maxLength: 50 }
        medicationRoute: { type: string, maxLength: 50 }
        medicationFrequency: { type: string, maxLength: 100 }
        medicationDuration: { type: string, maxLength: 100 }
        medicationQuantity:
          type: integer
          minimum: 0
        medicationRefills:
          type: integer
          minimum: 0
    UpdateOrderRequest:
      type: object
      description: >-
        Partial update — only fields present in the body are touched.
        Allowed fields mirror CreateOrderRequest (no encounterId or
        orderType; those are immutable post-creation).
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        indication: { type: ["string", "null"], maxLength: 500 }
        indicationDiagnosisCode: { type: ["string", "null"], maxLength: 20 }
        priority: { $ref: "#/components/schemas/OrderPriority" }
        instructions: { type: ["string", "null"], maxLength: 2000 }
        frequency: { type: ["string", "null"], maxLength: 100 }
        duration: { type: ["string", "null"], maxLength: 100 }
        medicationName: { type: ["string", "null"], maxLength: 200 }
        medicationDose: { type: ["string", "null"], maxLength: 50 }
        medicationRoute: { type: ["string", "null"], maxLength: 50 }
        medicationFrequency: { type: ["string", "null"], maxLength: 100 }
        medicationDuration: { type: ["string", "null"], maxLength: 100 }
        medicationQuantity:
          type: ["integer", "null"]
          minimum: 0
        medicationRefills:
          type: ["integer", "null"]
          minimum: 0
    CancelOrderRequest:
      type: object
      properties:
        reason:
          type: string
          maxLength: 500

    TaskCategory:
      type: string
      enum:
        - call_patient
        - schedule_followup
        - send_referral
        - prior_auth
        - obtain_records
        - repeat_labs
        - nursing_instruction
        - billing_followup
        - patient_instruction
        - other
    TaskStatus:
      type: string
      enum: [open, in_progress, completed, cancelled]
    TaskPriority:
      type: string
      enum: [low, normal, high]
    Task:
      type: object
      required:
        - id
        - encounterId
        - category
        - title
        - description
        - dueAt
        - priority
        - status
        - isClosed
        - source
      properties:
        id: { type: string }
        encounterId: { type: ["string", "null"] }
        category: { $ref: "#/components/schemas/TaskCategory" }
        title: { type: string }
        description: { type: ["string", "null"] }
        dueAt:
          type: ["string", "null"]
          format: date-time
        priority: { $ref: "#/components/schemas/TaskPriority" }
        status: { $ref: "#/components/schemas/TaskStatus" }
        isClosed: { type: boolean }
        source:
          type: string
          enum: [ai, manual]
    TaskListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/Task" }
    TaskGenerateResponse:
      type: object
      required: [data, source]
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/Task" }
        source:
          type: string
          enum: [ai, stub]
    CreateTaskRequest:
      type: object
      required: [patientId, title, category]
      properties:
        patientId: { type: string }
        encounterId: { type: string }
        title:
          type: string
          minLength: 1
          maxLength: 200
        description: { type: string, maxLength: 2000 }
        category: { $ref: "#/components/schemas/TaskCategory" }
        priority: { $ref: "#/components/schemas/TaskPriority" }
        dueAt:
          type: string
          format: date-time
        assignedUserId: { type: string }
    UpdateTaskRequest:
      type: object
      description: Partial update — only fields present in the body are touched.
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        description: { type: ["string", "null"], maxLength: 2000 }
        category: { $ref: "#/components/schemas/TaskCategory" }
        priority: { $ref: "#/components/schemas/TaskPriority" }
        dueAt:
          type: ["string", "null"]
          format: date-time
        assignedUserId:
          type: ["string", "null"]
        status: { $ref: "#/components/schemas/TaskStatus" }
    CancelTaskRequest:
      type: object
      properties:
        reason:
          type: string
          maxLength: 500
    FounderAnalytics:
      type: object
      required: [totals, dailySeries, compliance, users]
      properties:
        compliance:
          type: object
          required:
            - onboardingCompleted
            - onboardingPending
            - onboardingCompletionRate
            - staleBaaUsers
            - staleTermsUsers
            - stalePrivacyUsers
            - staleAnyUsers
          properties:
            onboardingCompleted:
              type: integer
            onboardingPending:
              type: integer
            onboardingCompletionRate:
              type: number
              description: 0..1
            staleBaaUsers:
              type: integer
              description: Users without a current BAA acceptance.
            staleTermsUsers:
              type: integer
            stalePrivacyUsers:
              type: integer
            staleAnyUsers:
              type: integer
              description: Users stale on any required document.
        dailySeries:
          type: object
          required: [signups, notes, recordings, startDate, endDate]
          description: >-
            Counts per UTC day for the last 30 days. Each array is
            ordered oldest → newest and includes zero-count days so
            the sparkline renderer can skip gap handling.
          properties:
            startDate:
              type: string
              format: date
              description: First day in the series (inclusive, UTC).
            endDate:
              type: string
              format: date
              description: Last day in the series (inclusive, UTC).
            signups:
              type: array
              items:
                $ref: "#/components/schemas/DailyCount"
            notes:
              type: array
              items:
                $ref: "#/components/schemas/DailyCount"
            recordings:
              type: array
              items:
                $ref: "#/components/schemas/DailyCount"
        totals:
          type: object
          required:
            - users
            - admins
            - patients
            - notes
            - recordingsTotal
            - recordingsDone
            - recordingsFailed
            - signupsLast7Days
            - signupsLast30Days
          properties:
            users:
              type: integer
            admins:
              type: integer
            patients:
              type: integer
            notes:
              type: integer
            recordingsTotal:
              type: integer
            recordingsDone:
              type: integer
            recordingsFailed:
              type: integer
            signupsLast7Days:
              type: integer
            signupsLast30Days:
              type: integer
        users:
          type: array
          items:
            $ref: "#/components/schemas/FounderUserRow"
    DailyCount:
      type: object
      required: [date, count]
      properties:
        date:
          type: string
          format: date
        count:
          type: integer
    FounderUserAcceptance:
      type: object
      required: [type, version, contentHash, acceptedAt]
      properties:
        type:
          type: string
          enum: [baa, terms, privacy]
        version:
          type: string
        contentHash:
          type: string
        ipAddress:
          type: string
        userAgent:
          type: string
        acceptedAt:
          type: string
          format: date-time
    FounderUserDetail:
      type: object
      required: [user, acceptances, dailySeries]
      properties:
        user:
          $ref: "#/components/schemas/FounderUserRow"
        acceptances:
          type: array
          description: Full append-only history, newest first.
          items:
            $ref: "#/components/schemas/FounderUserAcceptance"
        dailySeries:
          type: object
          required: [startDate, endDate, notes, recordings, patients]
          properties:
            startDate:
              type: string
              format: date
            endDate:
              type: string
              format: date
            notes:
              type: array
              items:
                $ref: "#/components/schemas/DailyCount"
            recordings:
              type: array
              items:
                $ref: "#/components/schemas/DailyCount"
            patients:
              type: array
              items:
                $ref: "#/components/schemas/DailyCount"
    FounderUserRow:
      type: object
      required:
        - id
        - email
        - displayName
        - role
        - createdAt
        - patientCount
        - noteCount
        - recordingCount
        - legalAcceptances
      properties:
        id:
          type: string
        email:
          type: string
        displayName:
          type: string
        role:
          type: string
          enum: [admin, member]
        isFounder:
          type: boolean
        createdAt:
          type: string
          format: date-time
        lastNoteAt:
          type: string
          format: date-time
          description: When the user last created or edited a clinical note.
        patientCount:
          type: integer
        noteCount:
          type: integer
        recordingCount:
          type: integer
        legalAcceptances:
          type: array
          description: One entry per required document type for this user.
          items:
            $ref: "#/components/schemas/FounderUserLegalStatus"
    FounderUserLegalStatus:
      type: object
      required: [type, currentVersion, accepted]
      properties:
        type:
          type: string
          enum: [baa, terms, privacy]
        currentVersion:
          type: string
        accepted:
          type: boolean
        acceptedVersion:
          type: string
          description: Most recently accepted version (may be older than current).
        acceptedAt:
          type: string
          format: date-time
    LegalAgreementStatus:
      type: object
      required:
        - type
        - title
        - summary
        - currentVersion
        - body
        - contentHash
        - accepted
      properties:
        type:
          type: string
          enum: [baa, terms, privacy]
        title:
          type: string
        summary:
          type: string
        currentVersion:
          type: string
        body:
          type: string
          description: Markdown body of the current version.
        contentHash:
          type: string
          description: SHA-256 (hex) of `body`. Frontend echoes this back on POST.
        accepted:
          type: boolean
          description: True iff the signed-in user has accepted `currentVersion`.
        acceptedAt:
          type: string
          format: date-time
          description: When the current version was accepted. Absent if accepted=false.
    AcceptLegalAgreementsRequest:
      type: object
      required: [acceptances]
      properties:
        acceptances:
          type: array
          minItems: 1
          items:
            type: object
            required: [type, version, contentHash]
            properties:
              type:
                type: string
                enum: [baa, terms, privacy]
              version:
                type: string
              contentHash:
                type: string
                description: >-
                  The hash the client received on GET. Server re-computes
                  from disk and rejects with 400 if they don't match —
                  protects against a stale client persisting a stale hash.
    UploadLegalVersionRequest:
      type: object
      required: [type, version, body]
      properties:
        type:
          type: string
          enum: [baa, terms, privacy]
        version:
          type: string
          description: SemVer-ish, must be unique per type.
          minLength: 1
          maxLength: 32
        body:
          type: string
          description: Full Markdown body of the new version.
          minLength: 100
    UploadLegalVersionResult:
      type: object
      required: [type, version, contentHash, notifiedUserCount]
      properties:
        type:
          type: string
        version:
          type: string
        contentHash:
          type: string
        notifiedUserCount:
          type: integer
          description: How many users got a notification email.
    NoteDefaultSuggestion:
      type: object
      required: [key, label, rule]
      properties:
        key:
          type: string
          description: >-
            Stable identifier of the suggestion (e.g. "ros-default"). The
            UI uses this to mark already-adopted suggestions.
        label:
          type: string
        rule:
          type: string
        description:
          type: string
          description: >-
            Plain-English explanation of what this default does, shown
            in the UI under the label.
    EhrProviderConnection:
      type: object
      required: [connected]
      properties:
        connected:
          type: boolean
        practitionerId:
          type: ["string", "null"]
          description: Practitioner.id resolved from the SMART OAuth context.
        scope:
          type: ["string", "null"]
        expiresAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    EhrConnectionStatus:
      type: object
      required: [athenahealth]
      properties:
        athenahealth:
          $ref: "#/components/schemas/EhrProviderConnection"
    StartEhrOauthRequest:
      type: object
      properties:
        returnPath:
          type: string
          description: Same-origin path to navigate to after the callback completes (e.g. "/settings").
    CreateRecordingRequest:
      type: object
      properties:
        patientId:
          type: ["string", "null"]
          description: >-
            Optional. Set when the recording is associated with a
            patient (the usual flow); null for unattached test captures.
    RecordingJob:
      type: object
      required: [id, status, createdAt, updatedAt]
      properties:
        id:
          type: string
        patientId:
          type: ["string", "null"]
        noteId:
          type: ["string", "null"]
          description: Set when a draft note has been materialized from the structured body
        status:
          type: string
          enum:
            - capturing
            - queued
            - transcribing
            - structuring
            - done
            - failed
            - cancelled
        transcript:
          type: ["string", "null"]
        liveTranscript:
          type: ["string", "null"]
          description: >-
            Accumulated `is_final` lines captured by the streaming
            transcript bridge, joined with newlines. Distinct from
            `transcript` (set by the batch transcribe step after
            segments upload). Useful for audit + reproducing what an
            auto-stop fired on.
        structuredBody:
          type: ["string", "null"]
          description: AI-generated clinical note body; populated when status == done
        errorMessage:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        completedAt:
          type: ["string", "null"]
          format: date-time
    RecordingSegment:
      type: object
      required:
        - id
        - recordingJobId
        - ordinal
        - mimeType
        - sizeBytes
        - durationMs
        - uploadedAt
      properties:
        id:
          type: string
        recordingJobId:
          type: string
        ordinal:
          type: integer
        mimeType:
          type: string
        sizeBytes:
          type: integer
        durationMs:
          type: integer
        uploadedAt:
          type: string
          format: date-time
    RecordingJobDetail:
      allOf:
        - $ref: "#/components/schemas/RecordingJob"
        - type: object
          required: [segments]
          properties:
            segments:
              type: array
              items:
                $ref: "#/components/schemas/RecordingSegment"
